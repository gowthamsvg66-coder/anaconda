<!DOCTYPE html>
<html>
<head>
<title>Programs</title>

<style>

body{
font-family: Arial;
background:#f5f6fa;
}

.container{
display:flex;
flex-wrap:wrap;
}

.card{
background:white;
padding:15px;
margin:10px;
width:250px;
cursor:pointer;
box-shadow:0 0 5px gray;
}

#viewer{
white-space:pre-wrap;
background:white;
padding:20px;
margin-top:20px;
font-family:monospace;
}

</style>

</head>

<body>

<h1>exam</h1>

<div class="container">

<div class="card" onclick="loadCode('bank.txt')">Bank Program</div>
<div class="card" onclick="loadCode('prog1.txt')">Program 1</div>
<div class="card" onclick="loadCode('prog2.txt')">Program 2</div>
<div class="card" onclick="loadCode('prog3.txt')">Program 3</div>
<div class="card" onclick="loadCode('prog4.txt')">Program 4</div>
<div class="card" onclick="loadCode('prog5.txt')">Program 5</div>
<div class="card" onclick="loadCode('prog6.txt')">Program 6</div>
<div class="card" onclick="loadCode('prog7.txt')">Program 7</div>
<div class="card" onclick="loadCode('prog8.txt')">Program 8</div>
<div class="card" onclick="loadCode('prog9.txt')">Program 9</div>
<div class="card" onclick="loadCode('prog10.txt')">Program 10</div>
<div class="card" onclick="loadCode('prog11.txt')">Program 11</div>

</div>

<button onclick="copyCode()">Copy Code</button>

<pre id="viewer">
Click program to view code
</pre>

<script>

function loadCode(file){
fetch(file)
.then(response => response.text())
.then(data => {
document.getElementById("viewer").textContent = data;
});
}

function copyCode(){
navigator.clipboard.writeText(
document.getElementById("viewer").innerText
);
alert("Code Copied!");
}

</script>

</body>
</html>
