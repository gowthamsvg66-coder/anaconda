<!DOCTYPE html>
<html>
<head>
<title>Python Programs</title>

<style>

body{
font-family:Arial;
background:#f5f6fa;
margin:0;
}

header{
background:#2c3e50;
color:white;
padding:20px;
text-align:center;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
}

.card{
background:white;
width:250px;
padding:20px;
margin:15px;
border-radius:10px;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
cursor:pointer;
}

.card:hover{
background:#ecf0f1;
}

#viewer{
margin:30px;
padding:20px;
background:white;
border-radius:10px;
box-shadow:0 0 10px gray;
white-space:pre-wrap;
font-family:monospace;
overflow:auto;
}

button{
padding:10px;
margin:10px;
}

</style>

</head>

<body>

<header>
<h1>Python</h1>
</header>

<div class="container">

<div class="card" onclick="loadCode('1bank.py')">Bank Program</div>
<div class="card" onclick="loadCode('prog-1.py')">Program 1</div>
<div class="card" onclick="loadCode('prog-2.py')">Program 2</div>
<div class="card" onclick="loadCode('prog-3.py')">Program 3</div>
<div class="card" onclick="loadCode('prog-4.py')">Program 4</div>
<div class="card" onclick="loadCode('prog-5.py')">Program 5</div>
<div class="card" onclick="loadCode('prog-6.py')">Program 6</div>
<div class="card" onclick="loadCode('prog-7.py')">Program 7</div>
<div class="card" onclick="loadCode('prog-8 bank.py')">Bank GUI</div>
<div class="card" onclick="loadCode('prog-9.py')">Program 9</div>
<div class="card" onclick="loadCode('prog-10.py')">Program 10</div>
<div class="card" onclick="loadCode('prog-11.py')">Calculator</div>

</div>

<center>
<button onclick="copyCode()">Copy Code</button>
</center>

<div id="viewer">
Click any program to view code...
</div>

<script>

function loadCode(file){
fetch(file)
.then(response => response.text())
.then(data => {
document.getElementById("viewer").textContent = data;
});
}

function copyCode(){
var text = document.getElementById("viewer").innerText;
navigator.clipboard.writeText(text);
alert("Code Copied!");
}

</script>

</body>
</html>
